<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple DnD Map Editor</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="group">
        <div class="brand">Simple DnD Map Editor</div>
      </div>
      <div class="group">
        <button id="undoBtn">Rückgängig</button>
        <button id="redoBtn">Wiederholen</button>
        <button id="newMapBtn">Neue Map</button>
        <button id="saveJsonBtn">JSON speichern</button>
        <button id="exportPngBtn">PNG exportieren</button>
        <button id="toggleGridBtn" class="active">Grid an</button>
      </div>
    </header>

    <aside class="sidebar">
      <section class="section">
        <h2 class="panel-title">Werkzeuge</h2>
        <div class="tool-grid" id="toolButtons"></div>
      </section>

      <section class="section">
        <h2 class="panel-title">Map</h2>
        <div class="row">
          <div class="field">
            <label for="mapWidth">Breite</label>
            <input id="mapWidth" type="number" min="4" max="200" value="30" />
          </div>
          <div class="field">
            <label for="mapHeight">Höhe</label>
            <input id="mapHeight" type="number" min="4" max="200" value="20" />
          </div>
        </div>
        <div class="field">
          <label for="tileSize">Tile-Größe</label>
          <input id="tileSize" type="number" min="12" max="64" value="24" />
        </div>
        <button id="resizeMapBtn">Map anwenden</button>
      </section>

      <section class="section">
        <h2 class="panel-title">Import</h2>
        <div class="field">
          <label for="jsonFileInput">JSON laden</label>
          <input id="jsonFileInput" type="file" accept="application/json" />
        </div>
      </section>

      <section>
        <h2 class="panel-title">Shortcuts</h2>
        <div class="hint">
          <div><span class="kbd">1</span> Pinsel</div>
          <div><span class="kbd">2</span> Radierer</div>
          <div><span class="kbd">3</span> Fill</div>
          <div><span class="kbd">4</span> Rechteck</div>
          <div><span class="kbd">5</span> Kreis</div>
          <div><span class="kbd">6</span> Text</div>
          <div><span class="kbd">G</span> Grid</div>
          <div><span class="kbd">+</span> / <span class="kbd">-</span> Zoom</div>
        </div>
      </section>
    </aside>

    <main class="canvas-wrap" id="canvasWrap">
      <div class="map-stage" id="mapStage">
        <canvas id="mapCanvas" width="720" height="480"></canvas>
        <button class="resize-handle resize-handle-right" id="resizeHandleRight" type="button" aria-label="Map nach rechts ziehen"></button>
        <button class="resize-handle resize-handle-bottom" id="resizeHandleBottom" type="button" aria-label="Map nach unten ziehen"></button>
        <button class="resize-handle resize-handle-corner" id="resizeHandleCorner" type="button" aria-label="Map diagonal ziehen"></button>
      </div>
    </main>

    <aside class="rightbar">
      <section class="section">
        <h2 class="panel-title">Tiles</h2>
        <div class="tile-grid" id="tileButtons"></div>
      </section>

      <section class="section">
        <h2 class="panel-title">Text</h2>
        <div class="field">
          <label for="textInput">Textinhalt</label>
          <input id="textInput" type="text" value="Raum A" />
        </div>
        <div class="field">
          <label for="textSizeInput">Textgröße</label>
          <input id="textSizeInput" type="number" min="8" max="72" value="18" />
        </div>
        <div class="hint">Wähle das Tool <span class="kbd">Text</span> und klicke auf die Map, um ein Label zu platzieren.</div>
      </section>

      <section class="section">
        <div class="layer-header">
          <h2 class="panel-title" style="margin:0;">Layer</h2>
          <button id="addLayerBtn">+ Layer</button>
        </div>
        <div class="layer-list" id="layerList"></div>
      </section>

      <section class="section">
        <h2 class="panel-title">Ansicht</h2>
        <div class="group">
          <button id="zoomOutBtn">-</button>
          <button id="zoomResetBtn">100%</button>
          <button id="zoomInBtn">+</button>
        </div>
      </section>

      <section>
        <h2 class="panel-title">Status</h2>
        <div class="status" id="statusBox"></div>
      </section>
    </aside>
  </div>
 <script src="script.js"></script>
</body>
</html>
